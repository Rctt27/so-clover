services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./Infrastructure/Persistence/Migrations/0001_CreateGames.sql:/docker-entrypoint-initdb.d/0001_CreateGames.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  web:
    image: soclover-web:latest
    build:
      # Use the repository root as build context so Dockerfile COPY paths like
      # "COPY SoClover/SoClover.csproj SoClover/" resolve correctly.
      context: ..
      dockerfile: SoClover/Dockerfile
      args:
        VITE_DEBUG_MODE: ${VITE_DEBUG_MODE:-false}
    environment:
      ConnectionStrings__GameDb: Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # LLM provider — override appsettings.{Env}.json via env vars LLM__*.
      # Defaults below ciblent LM Studio sur l'hôte (test local depuis Docker).
      # Pour basculer sur Anthropic en prod : LLM__PROVIDER=Anthropic + LLM__APIKEY=sk-ant-... dans .env.
      LLM__PROVIDER: ${LLM__PROVIDER:-OpenAI}
      LLM__BASEURL: ${LLM__BASEURL:-http://host.docker.internal:1234/v1}
      LLM__DEFAULTMODEL: ${LLM__DEFAULTMODEL:-lmstudio-community/Meta-Llama-3.1-8B-Instruct-GGUF}
      LLM__MAXCONCURRENCY: ${LLM__MAXCONCURRENCY:-1}
      LLM__APIKEY: ${LLM__APIKEY:?LLM__APIKEY must be set in .env}
    extra_hosts:
      # Permet à `host.docker.internal` de résoudre l'hôte sous Linux (no-op sur Docker Desktop Win/Mac).
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

volumes:
  dbdata: