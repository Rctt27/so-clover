services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soclover
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./Infrastructure/Persistence/Migrations/0001_CreateGames.sql:/docker-entrypoint-initdb.d/0001_CreateGames.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d soclover"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  web:
    build:
      # Use the repository root as build context so Dockerfile COPY paths like
      # "COPY SoClover/SoClover.csproj SoClover/" resolve correctly.
      context: ..
      dockerfile: SoClover/Dockerfile
    environment:
      ConnectionStrings__GameDb: Host=db;Database=soclover;Username=postgres;Password=postgres
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
    

volumes:
  dbdata:
  caddy-data:
  caddy-config:

