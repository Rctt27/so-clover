<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoClover - Browser Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍀 SoClover</h1>
            <p class="subtitle">Welcome to the browser game</p>
        </header>

        <main>
            <!-- Player Name Section -->
            <section class="card" id="playerSection">
                <h2>Player Setup</h2>
                <div class="form-group">
                    <label for="playerName">Your Name</label>
                    <input 
                        type="text" 
                        id="playerName" 
                        placeholder="Enter your player name (max 32 characters)" 
                        maxlength="32"
                        autocomplete="off">
                    <span class="char-counter"><span id="charCount">0</span>/32</span>
                </div>
                <div class="player-info" id="playerInfo" style="display: none;">
                    <p>👤 Playing as: <strong id="displayName"></strong></p>
                </div>
            </section>

            <!-- Game Management Section -->
            <section class="card" id="gameSection">
                <h2>Game Management</h2>

                <!-- No Game State -->
                <div id="noGameState">
                    <p class="info-text">No active game. Create a new game to get started!</p>
                    <div class="form-group">
                        <label for="gameIdInput">Game ID (optional)</label>
                        <input
                            type="text"
                            id="gameIdInput"
                            placeholder="Paste Game ID to join an existing game"
                            autocomplete="off">
                    </div>
                    <button class="btn btn-primary" id="createGameBtn" disabled>
                        <span class="btn-icon">🎮</span>
                        Create Game
                    </button>
                    <p class="hint">Please enter your player name first</p>
                </div>

                <!-- Active Game State -->
                <div id="activeGameState" style="display: none;">
                    <div class="game-info">
                        <div class="game-id-box">
                            <label>Game ID</label>
                            <div class="game-id">
                                <code id="gameIdDisplay"></code>
                                <button class="btn-copy" id="copyBtn" title="Copy to clipboard">
                                    📋
                                </button>
                            </div>
                        </div>
                        <div class="status-badge success">
                            ✓ Game Created
                        </div>
                    </div>

                    <button class="btn btn-danger" id="cancelGameBtn">
                        <span class="btn-icon">❌</span>
                        Cancel Game
                    </button>
                </div>
            </section>

            <!-- Status Messages -->
            <div id="statusMessage" class="status-message" style="display: none;"></div>
        </main>

        <footer>
            <p>SoClover Browser Game &copy; 2025</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
